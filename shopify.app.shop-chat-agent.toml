client_id = "66f6e80cf9353b43ec15bba861e051d4"
name = "shop-chat-agent"
application_url = "https://adaptive-transportation-watson-wires.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
#
# Path B Hybrid architecture (see app/services/customer-identity.server.js):
#   The Customer Account OAuth token only grants `customer-account-mcp-api:full`
#   (Shopify won't let us request `customer-account-api:full` without Level 2
#   Protected Customer Data approval). So we use the MCP token only to IDENTIFY
#   the customer (JWT `sub` claim → Admin customer GID), then run ALL order /
#   profile / return operations through the Admin API server-side, scoped to
#   that verified customer ID.
#
# Scopes:
#   unauthenticated_read_product_listings — Storefront catalog reads (widget side)
#   read_orders                           — fetch customer's orders for listing + ownership checks
#   write_orders                          — orderCancel mutation
#   read_customers                        — get_my_profile + address reads
#   write_customers                       — update_my_profile + customerAddress mutations
#   read_returns                          — read return state on Order.returns
#   write_returns                         — returnRequest mutation (REQUESTED state)
scopes = "unauthenticated_read_product_listings,read_orders,write_orders,read_customers,write_customers,read_returns,write_returns"

[auth]
redirect_urls = [ "https://adaptive-transportation-watson-wires.trycloudflare.com/api/auth" ]

# Customer Account OAuth (used by the chat widget's customer sign-in flow).
#
# Auto-managed: `automatically_update_urls_on_dev = true` keeps this URL in
# sync with the current `shopify app dev` tunnel. The runtime callback URL is
# also derived from SHOPIFY_APP_URL via app/auth.server.js → buildRedirectUri,
# so this value is what gets pushed to Partner Dashboard on the next deploy.
#
# CONSTRAINTS:
#   • The Customer Account API requires HTTPS — no localhost, no 127.0.0.1,
#     no http://. Use a tunnel (Cloudflare Quick Tunnel from `shopify app dev`
#     by default; ngrok with a static domain if you want URL stability).
#   • Path MUST be `/auth/callback` (mounts at app/routes/auth.callback.jsx).
[customer_authentication]
redirect_uris = [ "https://adaptive-transportation-watson-wires.trycloudflare.com/auth/callback" ]
